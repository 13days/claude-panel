<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Claude Panel</title>
<style>
  :root {
    --bg: #0f1115; --panel: #171a21; --panel2: #1d212b; --border: #2a2f3a;
    --text: #e6e9ef; --muted: #8b93a5; --accent: #d97b4f; --accent2: #e8965f;
    --danger: #e05d5d; --green: #4fae7a; --code-bg: #12141a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, "PingFang SC", "Helvetica Neue", sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; overflow: hidden; }

  /* ---------- 侧栏 ---------- */
  #sidebar { width: 300px; min-width: 300px; background: var(--panel); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
  #logo { padding: 18px 16px 12px; font-size: 17px; font-weight: 700; letter-spacing: .5px; display: flex; align-items: center; }
  #logo span { color: var(--accent); margin-left: 4px; }
  #langSel { padding: 6px 8px; border-radius: 7px; border: 1px solid var(--border); background: var(--panel2); color: var(--text); font-size: 12.5px; cursor: pointer; outline: none; }
  #langSel:hover, #langSel:focus { border-color: var(--accent); }
  #tabs { display: flex; flex-wrap: wrap; gap: 6px; padding: 0 12px 12px; }
  .tab { flex: 1 1 28%; text-align: center; padding: 7px 0; border-radius: 8px; cursor: pointer; font-size: 13px; color: var(--muted); background: var(--panel2); border: 1px solid transparent; user-select: none; white-space: nowrap; }
  .tab.active { color: var(--text); border-color: var(--accent); background: rgba(217,123,79,.12); }
  .tab .cnt { font-size: 11px; opacity: .75; margin-left: 3px; }
  #searchbox { padding: 0 12px 10px; }
  #search { width: 100%; padding: 8px 10px; border-radius: 8px; border: 1px solid var(--border); background: var(--panel2); color: var(--text); font-size: 13px; outline: none; }
  #search:focus { border-color: var(--accent); }
  #projbar { padding: 0 12px 10px; }
  #projSel { width: 100%; padding: 7px 10px; border-radius: 8px; border: 1px solid var(--border); background: var(--panel2); color: var(--text); font-size: 12.5px; outline: none; cursor: pointer; }
  #projSel:hover, #projSel:focus { border-color: var(--accent); }

  /* ---------- 统计仪表盘 ---------- */
  .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 18px; }
  .card { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; }
  .card .v { font-size: 23px; font-weight: 700; }
  .card .k { font-size: 12px; color: var(--muted); margin-top: 4px; }
  .chart { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 16px; }
  .chart h3 { font-size: 13.5px; margin: 0 0 14px; }
  .chartHead { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; flex-wrap: wrap; gap: 8px; }
  .chartHead h3 { margin: 0; }
  .range { display: flex; gap: 4px; }
  .rangebtn { padding: 3px 10px; border-radius: 14px; font-size: 11.5px; color: var(--muted); background: var(--panel2); border: 1px solid var(--border); cursor: pointer; }
  .rangebtn.active { color: var(--text); border-color: var(--accent); background: rgba(217,123,79,.12); }
  #tip { position: fixed; display: none; background: var(--panel2); border: 1px solid var(--border); color: var(--text); padding: 6px 10px; border-radius: 8px; font-size: 12px; pointer-events: none; z-index: 100; box-shadow: 0 4px 16px rgba(0,0,0,.5); white-space: nowrap; font-family: ui-monospace, monospace; }

  /* ---------- Live 实时条 ---------- */
  #liveBar { display: flex; align-items: center; gap: 18px; flex-wrap: wrap; background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 12px 16px; margin-bottom: 16px; font-size: 13px; }
  #liveBar .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); animation: pulse 1.6s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1 } 50% { opacity: .3 } }
  #liveBar b { font-size: 17px; font-family: ui-monospace, monospace; }
  #liveBar .lv { color: var(--muted); }
  #liveBar.over { border-color: var(--danger); }
  #liveBar.over b.cost { color: var(--danger); }
  #liveBar input { width: 76px; padding: 4px 8px; border-radius: 6px; border: 1px solid var(--border); background: var(--panel2); color: var(--text); font-size: 12px; outline: none; }

  /* ---------- 会话回放 ---------- */
  .bubble { max-width: 78%; margin: 10px 0; padding: 10px 14px; border-radius: 14px; font-size: 13.5px; line-height: 1.65; white-space: pre-wrap; word-break: break-word; }
  .bubble.user { margin-left: auto; background: rgba(217,123,79,.16); border: 1px solid rgba(217,123,79,.35); border-bottom-right-radius: 4px; }
  .bubble.assistant { margin-right: auto; background: var(--panel); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
  .bubble .bts { font-size: 10.5px; color: var(--muted); margin-bottom: 4px; font-family: ui-monospace, monospace; }
  .bubble .mdbody { white-space: normal; }
  .bubble .mdbody > :first-child { margin-top: 0; }
  .bubble .mdbody > :last-child { margin-bottom: 0; }
  .bubble .mdbody p { margin: 6px 0; }
  .bubble .mdbody ul, .bubble .mdbody ol { margin: 6px 0 6px 22px; }
  .bubble .mdbody code { background: var(--code-bg); border: 1px solid var(--border); padding: 1px 5px; border-radius: 5px; font-family: ui-monospace, monospace; font-size: 12px; }
  .bubble .mdbody pre { background: var(--code-bg); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; overflow-x: auto; margin: 8px 0; }
  .bubble .mdbody pre code { background: none; border: none; padding: 0; }
  .bubble .mdbody h1, .bubble .mdbody h2, .bubble .mdbody h3 { font-size: 15px; margin: 10px 0 6px; }
  .bubble details { margin-top: 6px; font-size: 12px; }
  .bubble details summary { cursor: pointer; color: var(--accent2); font-family: ui-monospace, monospace; }
  .bubble details pre { background: var(--code-bg); border: 1px solid var(--border); border-radius: 8px; padding: 8px 10px; margin-top: 6px; overflow-x: auto; font-size: 11.5px; white-space: pre-wrap; }
  #replayWrap { max-width: 920px; display: flex; flex-direction: column; }
  .bubble details.thinking summary { color: #9085e9; }
  .bubble details.thinking pre { color: #a99ff0; font-style: italic; background: rgba(144,133,233,.06); border-color: rgba(144,133,233,.3); }
  .bubble .tlabel { font-size: 10.5px; color: var(--muted); margin-top: 6px; text-transform: uppercase; letter-spacing: .5px; }
  .turn-meta { text-align: center; color: var(--muted); font-size: 11px; margin: 12px 0; font-family: ui-monospace, monospace; opacity: .7; }

  /* ---------- 搜索结果 / 侧栏底部按钮 ---------- */
  .sr-role { font-size: 10px; padding: 1px 6px; border-radius: 8px; margin-right: 6px; border: 1px solid var(--border); color: var(--muted); }
  #footerBtns { display: none; gap: 8px; margin: 8px 12px 14px; }
  #footerBtns button { flex: 1; padding: 8px; border-radius: 8px; border: 1px dashed var(--border); background: none; color: var(--accent2); font-size: 12.5px; cursor: pointer; }
  #footerBtns button:hover { border-color: var(--accent); }

  /* ---------- Wrapped 分享卡片 ---------- */
  #wmodal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 60; align-items: center; justify-content: center; }
  #wmodal .wbox { display: flex; flex-direction: column; gap: 12px; max-height: 94vh; }
  #wmodal .wctrl { display: flex; gap: 8px; align-items: center; }
  #wcanvas { width: 420px; max-height: calc(94vh - 60px); border-radius: 18px; box-shadow: 0 12px 48px rgba(0,0,0,.6); }
  .bars { display: flex; align-items: flex-end; gap: 2px; height: 120px; padding-top: 16px; }
  .bars .b { flex: 1; background: #3987e5; border-radius: 3px 3px 0 0; min-height: 2px; position: relative; }
  .bars .b:hover { background: #86b6ef; }
  .bars .b .lbl { position: absolute; top: -16px; left: 50%; transform: translateX(-50%); font-size: 10px; color: var(--muted); white-space: nowrap; }
  .axis { display: flex; justify-content: space-between; font-size: 10.5px; color: var(--muted); margin-top: 6px; }
  .hbar-row { display: flex; align-items: center; gap: 10px; margin: 7px 0; }
  .hbar-name { width: 230px; text-align: right; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-family: ui-monospace, monospace; font-size: 11.5px; }
  .hbar-track { flex: 1; }
  .hbar-fill { height: 14px; border-radius: 0 3px 3px 0; min-width: 2px; }
  .hbar-val { width: 80px; font-size: 11.5px; color: var(--muted); }
  /* 列宽按内容自适应：width:max-content 让每列撑到内容宽度，min-width 保证撑满容器，超宽由外层容器横向滚动 */
  table.usage { border-collapse: collapse; width: max-content; min-width: 100%; font-size: 12.5px; }
  table.usage th, table.usage td { border: 1px solid var(--border); padding: 5px 10px; text-align: left; vertical-align: top; white-space: nowrap; font-size: 12px; }
  table.usage th { background: var(--panel2); }
  table.usage td.num, table.usage th.num { text-align: right; font-family: ui-monospace, monospace; }
  table.usage tr.total td { font-weight: 700; background: var(--panel2); }

  #filterbar { display: flex; gap: 6px; padding: 0 12px 10px; }
  .fbtn { padding: 4px 12px; border-radius: 20px; font-size: 12px; color: var(--muted); background: var(--panel2); border: 1px solid var(--border); cursor: pointer; user-select: none; }
  .fbtn.active { color: var(--text); border-color: var(--accent); background: rgba(217,123,79,.12); }
  .tag { display: inline-block; font-size: 10px; padding: 1px 7px; border-radius: 10px; margin-left: 6px; vertical-align: 2px; border: 1px solid var(--border); color: var(--muted); }
  .tag.installed { border-color: #4a72b5; color: #7fa3d9; }
  .tag.user { border-color: var(--green); color: var(--green); }
  .tag.uses { border-color: rgba(217,123,79,.5); color: var(--accent2); }
  #list { flex: 1; overflow-y: auto; padding: 0 8px 8px; }
  .item { padding: 9px 10px; border-radius: 8px; cursor: pointer; margin-bottom: 2px; }
  .item:hover { background: var(--panel2); }
  .item.active { background: rgba(217,123,79,.15); outline: 1px solid rgba(217,123,79,.4); }
  .item .nm { font-size: 13.5px; font-weight: 600; font-family: ui-monospace, monospace; }
  .item .ds { font-size: 12px; color: var(--muted); margin-top: 2px; overflow: hidden; text-overflow: ellipsis; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
  #newbtn { margin: 8px 12px 14px; padding: 9px; border-radius: 8px; border: 1px dashed var(--border); background: none; color: var(--accent2); font-size: 13px; cursor: pointer; }
  #newbtn:hover { border-color: var(--accent); background: rgba(217,123,79,.08); }

  /* ---------- 主区 ---------- */
  #main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  #toolbar { display: flex; align-items: center; gap: 8px; padding: 12px 20px; border-bottom: 1px solid var(--border); background: var(--panel); }
  #title { font-size: 15px; font-weight: 700; font-family: ui-monospace, monospace; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  #fpath { font-size: 11px; color: var(--muted); font-weight: 400; margin-left: 8px; }
  .btn { padding: 7px 14px; border-radius: 7px; border: 1px solid var(--border); background: var(--panel2); color: var(--text); font-size: 13px; cursor: pointer; white-space: nowrap; }
  .btn:hover { border-color: var(--muted); }
  .btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn.primary:hover { background: var(--accent2); }
  .btn.danger { color: var(--danger); }
  .btn.danger:hover { border-color: var(--danger); }
  .btn:disabled { opacity: .4; cursor: default; }
  #content { flex: 1; overflow-y: auto; padding: 24px 32px; }
  #empty { color: var(--muted); text-align: center; margin-top: 20vh; font-size: 14px; }
  #editor { display: none; width: 100%; height: 100%; resize: none; background: var(--code-bg); color: var(--text); border: 1px solid var(--border); border-radius: 10px; padding: 16px; font-family: ui-monospace, "SF Mono", monospace; font-size: 13px; line-height: 1.6; outline: none; }
  #editor:focus { border-color: var(--accent); }
  #toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--panel2); border: 1px solid var(--border); padding: 10px 20px; border-radius: 10px; font-size: 13px; display: none; z-index: 99; box-shadow: 0 6px 24px rgba(0,0,0,.5); }

  /* ---------- frontmatter 元信息 ---------- */
  #metabar { display: none; flex-wrap: wrap; gap: 8px; margin-bottom: 18px; }
  .chip { font-size: 12px; padding: 4px 10px; border-radius: 20px; background: var(--panel2); border: 1px solid var(--border); color: var(--muted); max-width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .chip b { color: var(--accent2); font-weight: 600; margin-right: 4px; }

  /* ---------- markdown 渲染 ---------- */
  #render { max-width: 860px; line-height: 1.7; font-size: 14.5px; }
  #render.wide { max-width: none; }  /* 统计仪表盘用全宽 */
  #render h1 { font-size: 24px; margin: 18px 0 12px; border-bottom: 1px solid var(--border); padding-bottom: 8px; }
  #render h2 { font-size: 19px; margin: 20px 0 10px; }
  #render h3 { font-size: 16px; margin: 16px 0 8px; }
  #render h4 { font-size: 14.5px; margin: 14px 0 6px; }
  #render p { margin: 8px 0; }
  #render ul, #render ol { margin: 8px 0 8px 24px; }
  #render li { margin: 3px 0; }
  #render code { background: var(--code-bg); border: 1px solid var(--border); padding: 1px 6px; border-radius: 5px; font-family: ui-monospace, monospace; font-size: 13px; color: #f0b27a; }
  #render pre { background: var(--code-bg); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; overflow-x: auto; margin: 12px 0; }
  #render pre code { background: none; border: none; padding: 0; color: #cdd6e4; }
  #render blockquote { border-left: 3px solid var(--accent); padding: 4px 14px; color: var(--muted); margin: 10px 0; background: rgba(217,123,79,.05); border-radius: 0 8px 8px 0; }
  #render table { border-collapse: collapse; margin: 12px 0; display: block; overflow-x: auto; max-width: 100%; }
  #render th, #render td { border: 1px solid var(--border); padding: 6px 12px; font-size: 13.5px; text-align: left; }
  #render th { background: var(--panel2); }
  #render a { color: var(--accent2); }
  #render hr { border: none; border-top: 1px solid var(--border); margin: 16px 0; }
  #render img { max-width: 100%; }

  /* ---------- 新建弹窗 ---------- */
  #modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.55); z-index: 50; align-items: center; justify-content: center; }
  #modal .box { background: var(--panel); border: 1px solid var(--border); border-radius: 14px; padding: 24px; width: 420px; }
  #modal h3 { font-size: 16px; margin-bottom: 16px; }
  #modal input { width: 100%; padding: 9px 12px; border-radius: 8px; border: 1px solid var(--border); background: var(--panel2); color: var(--text); font-size: 14px; outline: none; font-family: ui-monospace, monospace; }
  #modal input:focus { border-color: var(--accent); }
  #modal .hint { font-size: 12px; color: var(--muted); margin: 8px 0 16px; }
  #modal .row { display: flex; gap: 10px; justify-content: flex-end; }
</style>
</head>
<body>

<div id="sidebar">
  <div id="logo">⌘ Claude <span>Panel</span></div>
  <div id="tabs">
    <div class="tab" data-type="commands">/ 命令<span class="cnt"></span></div>
    <div class="tab" data-type="skills">Skills<span class="cnt"></span></div>
    <div class="tab" data-type="agents">Agents<span class="cnt"></span></div>
    <div class="tab" data-type="plugins">插件<span class="cnt"></span></div>
    <div class="tab" data-type="config">配置<span class="cnt"></span></div>
    <div class="tab" data-type="workflows">工作流<span class="cnt"></span></div>
    <div class="tab" data-type="inspector">抓包<span class="cnt"></span></div>
    <div class="tab" data-type="sessions">会话<span class="cnt"></span></div>
    <div class="tab" data-type="stats">统计<span class="cnt"></span></div>
  </div>
  <div id="projbar"><select id="projSel"></select></div>
  <div id="searchbox"><input id="search" placeholder="搜索名称 / 描述…"></div>
  <div id="filterbar">
    <div class="fbtn active" data-origin="user">仅自建</div>
    <div class="fbtn" data-origin="all">全部</div>
  </div>
  <div id="list"></div>
  <button id="newbtn">＋ 新建</button>
  <div id="footerBtns">
    <button id="exportBtn"></button>
    <button id="importBtn"></button>
  </div>
  <input type="file" id="importFile" accept=".json" style="display:none">
</div>

<div id="main">
  <div id="toolbar">
    <div id="title">未选择<span id="fpath"></span></div>
    <button class="btn" id="editBtn" disabled>编辑</button>
    <button class="btn primary" id="saveBtn" style="display:none">保存</button>
    <button class="btn" id="cancelBtn" style="display:none">取消</button>
    <button class="btn danger" id="delBtn" disabled>删除</button>
    <select id="langSel" title="Language"></select>
  </div>
  <div id="content">
    <div id="empty">← 从左侧选择一个资源，或点击「新建」</div>
    <div id="metabar"></div>
    <div id="render"></div>
    <textarea id="editor" spellcheck="false"></textarea>
  </div>
</div>

<div id="modal">
  <div class="box">
    <h3 id="modalTitle">新建</h3>
    <input id="newName" placeholder="名称（如 my-command）">
    <div class="hint" id="modalHint"></div>
    <div class="row">
      <button class="btn" id="modalCancel" onclick="closeModal()">取消</button>
      <button class="btn primary" id="modalCreate" onclick="createItem()">创建</button>
    </div>
  </div>
</div>

<div id="toast"></div>
<div id="tip"></div>

<div id="wmodal">
  <div class="wbox">
    <div class="wctrl">
      <div class="range" id="wrange"></div>
      <div style="flex:1"></div>
      <button class="btn primary" id="wdl"></button>
      <button class="btn" id="wclose"></button>
    </div>
    <canvas id="wcanvas"></canvas>
  </div>
</div>

<script>
const $ = s => document.querySelector(s);

// ---------- i18n 框架 ----------
// 新增语言三步：1) LANGS 注册 code+label（出现在右上角下拉框）
//              2) I18N 里加同名字典（可只翻译一部分，缺失 key 自动回退 en → 默认语言）
//              3) 后端 server.js 的 STRINGS 里加同名字典（同样支持部分翻译）
const LANGS = [
  { code: 'zh', label: '中文' },
  { code: 'en', label: 'English' },
  { code: 'ja', label: '日本語' },
];
const DEFAULT_LANG = 'zh';
const I18N = {
  zh: {
    tabs: { commands: '/ 命令', skills: '技能', agents: '智能体', plugins: '插件', config: '配置', workflows: '工作流', inspector: '抓包', sessions: '会话', stats: '统计' },
    typeLabel: { commands: '命令', skills: '技能', agents: '智能体', plugins: '插件', config: '配置', workflows: '工作流', inspector: '请求', sessions: '会话', stats: '统计' },
    search: '搜索名称 / 描述…', mineOnly: '仅自建', all: '全部',
    newBtn: '＋ 新建', edit: '编辑', save: '保存', cancel: '取消', del: '删除', uninstall: '卸载', create: '创建',
    noSelection: '未选择', emptyHint: '← 从左侧选择一个资源，或点击「新建」',
    newTitle: '新建{label}', namePh: '名称（如 my-command）', nameRequired: '请输入名称',
    hintSkills: '将创建 ~/.claude/skills/<名称>/SKILL.md', hintFlat: '将创建 ~/.claude/{type}/<名称>.md',
    hintWorkflows: '将创建 ~/.claude/workflows/<名称>.js（可用 Workflow 工具按名称调用）',
    saved: '已保存 ✓', deleted: '已删除', created: '已创建 ✓',
    loadFail: '加载失败: ', saveFail: '保存失败: ', delFail: '删除失败: ', createFail: '创建失败: ',
    unsaved: '当前有未保存的编辑，确定放弃吗？',
    noteBuiltin: ' · 内置命令（只读）', notePluginCmd: ' · 插件提供（只读）',
    notePlugin: ' · 已安装插件（删除 = 卸载）', noteInstalled: ' · 已安装（软链接，只读）',
    tagBuiltin: '内置', tagInstalled: '安装', tagPluginPrefix: '插件:',
    confirmDel: '确定删除{label}「{name}」吗？\n{detail}',
    confirmUninstall: '确定卸载插件「{name}」吗？\n{detail}',
    delPlugin: '将从 installed_plugins.json 移除该插件（缓存文件保留，可重新安装），重启 Claude Code 后生效。',
    delInstalled: '这是工具安装的资源，只会移除软链接，源文件保留（可用安装工具恢复）。',
    delSkillDir: '将删除整个技能目录，此操作不可撤销。', delPlain: '此操作不可撤销。',
    scopeGlobal: '全局（~/.claude）',

if (!LANGS.some(l => l.code === lang)) lang = DEFAULT_LANG;
// 取字符串：当前语言 → en → 默认语言，逐级回退（部分翻译的语言也能正常工作）
const t = k => I18N[lang]?.[k] ?? I18N.en[k] ?? I18N[DEFAULT_LANG][k] ?? k;
const fmt = (tpl, vars) => tpl.replace(/\{(\w+)\}/g, (_, k) => vars[k] ?? '');
// 各专区能力：new=可新建, edit=可编辑, del=可删除, filter=显示自建/全部筛选
const CAPS = {
  commands: { new: true,  edit: true,  del: true,  filter: true },
  skills:   { new: true,  edit: true,  del: true,  filter: true },
  agents:   { new: true,  edit: true,  del: true,  filter: true },

// 支持项目作用域的专区
const SCOPED = ['commands', 'skills', 'agents', 'workflows', 'config'];
let state = { type: 'commands', items: [], current: null, editing: false, keyword: '', origin: 'user', scope: '', projects: [] };

function matchOrigin(it, type) {
  if (!CAPS[type || state.type].filter) return true;
  return state.origin === 'all' || (it.origin || 'user') === 'user';
}

async function api(method, path, body) {
  const q = 'lang=' + lang + (state.scope ? '&scope=' + encodeURIComponent(state.scope) : '');
  const res = await fetch('/api/' + path + (path.includes('?') ? '&' : '?') + q, {
    method,
    headers: body ? { 'Content-Type': 'application/json' } : undefined,
    body: body ? JSON.stringify(body) : undefined,
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || res.statusText);
  return data;
}

function toast(msg, ok = true) {

  t.textContent = msg;
  t.style.color = ok ? 'var(--green)' : 'var(--danger)';
  t.style.display = 'block';
  clearTimeout(t._h);
  t._h = setTimeout(() => t.style.display = 'none', 2200);
}

async function loadCounts() {
  for (const type of Object.keys(CAPS)) {
    if (CAPS[type].dashboard) continue; // 统计页无列表计数
    try {
      const { items } = await api('GET', type);
      if (!Array.isArray(items)) continue;
      document.querySelector(`.tab[data-type="${type}"] .cnt`).textContent = items.filter(it => matchOrigin(it, type)).length;
      if (type === state.type) { state.items = items; renderList(); }
    } catch (e) {}
  }
}

async function switchType(type) {
  disconnectLive();
  state.type = type; state.current = null; state.editing = false; state.keyword = '';
  $('#search').value = '';
  $('#search').placeholder = type === 'sessions' ? t('searchSessionsPh') : t('search');
  $('#footerBtns').style.display = type === 'config' ? 'flex' : 'none';
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.type === type));
  $('#newbtn').style.display = CAPS[type].new ? 'block' : 'none';
  $('#filterbar').style.display = CAPS[type].filter ? 'flex' : 'none';
  $('#delBtn').textContent = type === 'plugins' ? t('uninstall') : t('del');
  showEmpty();
  if (CAPS[type].dashboard) { await renderStatsTab(); return; }
  if (type === 'inspector') startInspectorPoll(); else stopInspectorPoll();
  const { items } = await api('GET', type);
  state.items = items;
  document.querySelector(`.tab[data-type="${type}"] .cnt`).textContent = items.filter(it => matchOrigin(it, type)).length;
  renderList();
}

function renderList() {
  const kw = state.keyword.toLowerCase();
  const list = $('#list');
  list.innerHTML = '';
  state.items
    .filter(it => matchOrigin(it))
    .filter(it => !kw || it.name.toLowerCase().includes(kw) || (it.description || '').toLowerCase().includes(kw))
    .forEach(it => {
      const key = it.key || it.name;
      const div = document.createElement('div');
      div.className = 'item' + (state.current === key ? ' active' : '');
      const prefix = state.type === 'commands' ? '/' : '';
      div.innerHTML = `<div class="nm"></div><div class="ds"></div>`;
      div.querySelector('.nm').textContent = prefix + it.name;
      if (state.origin === 'all' && it.origin === 'installed') {
        const tag = document.createElement('span');
        tag.className = 'tag installed';
        const src = it.source || 'installed';
        tag.textContent = src === 'builtin' ? t('tagBuiltin')
          : src.startsWith('plugin:') ? t('tagPluginPrefix') + src.slice(7)
          : t('tagInstalled');
        div.querySelector('.nm').appendChild(tag);
      }
      if (it.uses > 0) {
        const utag = document.createElement('span');
        utag.className = 'tag uses';
        utag.textContent = '×' + it.uses;
        utag.title = t('usesTip');
        div.querySelector('.nm').appendChild(utag);
      }
      div.querySelector('.ds').textContent = it.description || '';
      div.onclick = () => openItem(key, it.name);
      list.appendChild(div);
    });
}

function showEmpty() {
  $('#empty').style.display = 'block';
  $('#render').innerHTML = '';
  $('#render').classList.remove('wide');
  $('#metabar').style.display = 'none';
  $('#editor').style.display = 'none';
  $('#title').firstChild.textContent = t('noSelection');
  $('#fpath').textContent = '';
  $('#editBtn').disabled = $('#delBtn').disabled = true;
  setEditMode(false);
}

async function openItem(key, displayName) {
  if (state.editing && !confirm(t('unsaved'))) return;
  state.editing = false;
  if (state.type === 'inspector') return openInspect(key);
  try {
    const d = await api('GET', `${state.type}/${encodeURIComponent(key)}`);
    state.current = key;
    state.raw = d.content;
    $('#empty').style.display = 'none';
    $('#title').firstChild.textContent = (state.type === 'commands' ? '/' : '') + (displayName || d.name);
    state.currentOrigin = d.origin || 'user';
    const caps = CAPS[state.type];
    const readonlyCmd = state.type === 'commands' && key.includes('!');  // 内置或插件提供的命令
    const note = d.builtin ? t('noteBuiltin')
      : readonlyCmd ? t('notePluginCmd')
      : d.plugin ? t('notePlugin')
      : d.origin === 'installed' ? t('noteInstalled') : '';
    $('#fpath').textContent = d.path.replace(/^\/Users\/[^/]+/, '~') + note;
    $('#editBtn').disabled = !caps.edit || d.origin === 'installed';
    $('#delBtn').disabled = !caps.del || readonlyCmd;
    setEditMode(false);
    renderDoc(d);
    if (state.type === 'sessions' && d.session && d.hasTranscript) {
      const box = document.createElement('div');
      box.style.cssText = 'margin:0 0 18px;padding:14px 16px;border:1px solid rgba(217,123,79,.4);border-radius:12px;background:rgba(217,123,79,.08)';
      const rb = document.createElement('button');
      rb.className = 'btn primary';
      rb.style.fontSize = '14px';
      rb.textContent = t('replayBtn');
      rb.onclick = () => loadReplay(key);
      const sub = document.createElement('div');
      sub.style.cssText = 'font-size:12px;color:var(--muted);margin-top:8px';
      sub.textContent = t('replaySub');
      box.append(rb, sub);
      $('#render').prepend(box);
    }
    renderList();
  } catch (e) { toast(t('loadFail') + e.message, false); }
}

function renderDoc(d) {
  $('#render').classList.remove('wide');
  const metabar = $('#metabar');
  const keys = Object.keys(d.meta || {});
  if (keys.length) {
    metabar.style.display = 'flex';
    metabar.innerHTML = '';
    keys.forEach(k => {
      const c = document.createElement('div');
      c.className = 'chip';
      const b = document.createElement('b'); b.textContent = k;
      c.appendChild(b);
      c.appendChild(document.createTextNode(d.meta[k]));
      c.title = d.meta[k];
      metabar.appendChild(c);
    });
  } else metabar.style.display = 'none';
  if (d.lang === 'json' || d.lang === 'js') {
    $('#render').innerHTML = `<pre><code>${esc(d.content)}</code></pre>`;
    return;
  }
  const body = d.content.replace(/^---\r?\n[\s\S]*?\r?\n---\r?\n?/, '');
  $('#render').innerHTML = md(body);
}

function setEditMode(on) {
  state.editing = on;
  $('#editor').style.display = on ? 'block' : 'none';
  $('#render').style.display = on ? 'none' : 'block';
  $('#metabar').style.display = on ? 'none' : ($('#metabar').innerHTML ? 'flex' : 'none');
  $('#editBtn').style.display = on ? 'none' : 'inline-block';
  $('#saveBtn').style.display = on ? 'inline-block' : 'none';
  $('#cancelBtn').style.display = on ? 'inline-block' : 'none';
  if (on) { $('#editor').value = state.raw; $('#editor').focus(); }
}

// ---------- CRUD 操作 ----------
$('#editBtn').onclick = () => setEditMode(true);
$('#cancelBtn').onclick = () => { setEditMode(false); };
$('#saveBtn').onclick = async () => {
  try {
    await api('PUT', `${state.type}/${encodeURIComponent(state.current)}`, { content: $('#editor').value });
    state.raw = $('#editor').value;
    toast('已保存 ✓');
    setEditMode(false);
    const d = await api('GET', `${state.type}/${encodeURIComponent(state.current)}`);
    renderDoc(d);
    loadCounts();
  } catch (e) { toast(t('saveFail') + e.message, false); }
};
$('#delBtn').onclick = async () => {
  const label = t('typeLabel')[state.type];
  const detail = state.type === 'plugins' ? t('delPlugin')
    : state.currentOrigin === 'installed' ? t('delInstalled')
    : (state.type === 'skills' ? t('delSkillDir') : t('delPlain'));
  const msg = state.type === 'plugins'
    ? fmt(t('confirmUninstall'), { name: state.current, detail })
    : fmt(t('confirmDel'), { label, name: state.current, detail });
  if (!confirm(msg)) return;
  try {
    await api('DELETE', `${state.type}/${encodeURIComponent(state.current)}`);
    toast(t('deleted'));
    state.current = null;
    showEmpty();
    switchType(state.type);
  } catch (e) { toast(t('delFail') + e.message, false); }
};

$('#newbtn').onclick = () => {
  $('#modalTitle').textContent = fmt(t('newTitle'), { label: t('typeLabel')[state.type] });
  $('#modalHint').textContent = state.type === 'skills' ? t('hintSkills')
    : state.type === 'workflows' ? t('hintWorkflows')
    : fmt(t('hintFlat'), { type: state.type });
  $('#newName').value = '';
  $('#modal').style.display = 'flex';
  $('#newName').focus();
};
function closeModal() { $('#modal').style.display = 'none'; }
async function createItem() {
  const name = $('#newName').value.trim();
  if (!name) return toast(t('nameRequired'), false);
  try {
    const content = t('templates')[state.type].replaceAll('{NAME}', name);
    await api('POST', state.type, { name, content });
    closeModal();
    toast(t('created'));
    await switchType(state.type);
    openItem(name);
    setTimeout(() => setEditMode(true), 100);
  } catch (e) { toast(t('createFail') + e.message, false); }
}
$('#newName').addEventListener('keydown', e => { if (e.key === 'Enter') createItem(); });

$('#search').addEventListener('input', e => { state.keyword = e.target.value; renderList(); });
$('#search').addEventListener('keydown', async e => {
  if (e.key !== 'Enter' || state.type !== 'sessions') return;
  const q = e.target.value.trim();
  if (q.length < 2) return;
  try {
    const { results } = await api('GET', 'search?q=' + encodeURIComponent(q));
    renderSearchResults(results);
  } catch (err) { toast(t('loadFail') + err.message, false); }
});

function renderSearchResults(results) {
  const list = $('#list');
  list.innerHTML = '';
  if (!results.length) {
    list.innerHTML = `<div style="color:var(--muted);padding:12px;font-size:12.5px">${esc(t('srNone'))}</div>`;
    return;
  }
  for (const r of results) {
    const div = document.createElement('div');
    div.className = 'item';
    const nm = document.createElement('div'); nm.className = 'nm';
    const role = document.createElement('span'); role.className = 'sr-role';
    role.textContent = r.role === 'user' ? 'Q' : 'A';
    nm.appendChild(role);
    nm.appendChild(document.createTextNode(
      (r.ts || '').slice(0, 10) + (r.project ? ' · ' + r.project.split('/').pop() : '')));
    const ds = document.createElement('div'); ds.className = 'ds';
    ds.textContent = r.snippet;
    div.append(nm, ds);
    div.onclick = () => openItem(r.session);
    list.appendChild(div);
  }
}

// ---------- 会话回放 ----------
async function loadReplay(id) {
  try {
    const r = await api('GET', `sessions/${encodeURIComponent(id)}/replay`);
    const wrap = document.createElement('div');
    wrap.id = 'replayWrap';
    const back = document.createElement('button');
    back.className = 'btn'; back.style.cssText = 'margin-bottom:14px;align-self:flex-start';
    back.textContent = t('replayBack');
    back.onclick = () => openItem(id);
    wrap.appendChild(back);
    // 抓包关联：系统提示词 + 客户端版本（transcript 没有，来自 Inspector 代理）
    if (r.captured) {
      const banner = document.createElement('div');
      banner.style.cssText = 'margin-bottom:14px;padding:10px 14px;border:1px solid rgba(144,133,233,.4);border-radius:10px;background:rgba(144,133,233,.08);font-size:12px;color:#a99ff0';
      banner.textContent = '🕵️ ' + fmt(t('replayCaptured'), { v: r.clientVersion || '?' });
      wrap.appendChild(banner);
    } else {
      const note = document.createElement('div');
      note.style.cssText = 'margin-bottom:14px;padding:12px 16px;border:1px dashed var(--border);border-radius:10px;background:var(--panel);font-size:12.5px;color:var(--muted);line-height:1.6';
      if (r.proxyInstalled) {
        // 代理已装：历史会话补不回，新会话自动抓——不再叫用户装
        note.innerHTML = `${esc(t('replayHistTitle'))}<br><br>${esc(t('replayHistHint'))}`;
        wrap.appendChild(note);
      } else {
        // 真没装：给开启方法
        const cmd = `npx claude-code-panel install-proxy`;
        note.innerHTML = `${esc(t('replayNoCapTitle'))}<br><br><code style="background:var(--code-bg);border:1px solid var(--border);padding:2px 8px;border-radius:6px;font-family:ui-monospace,monospace;color:var(--accent2)">${esc(cmd)}</code> <button class="btn" id="ncCopy" style="padding:3px 10px;font-size:11.5px;margin-left:6px">${esc(t('insCopy'))}</button><br><br>${esc(t('replayNoCapHint'))}`;
        wrap.appendChild(note);
        setTimeout(() => { const b = $('#ncCopy'); if (b) b.onclick = () => { navigator.clipboard.writeText(cmd); toast('✓'); }; }, 0);
      }
    }
    if (r.systemPrompt) {
      const det = document.createElement('details');
      det.style.marginBottom = '14px';
      const sum = document.createElement('summary');
      sum.textContent = t('insSystem') + ' (' + (r.systemPrompt.length/1000).toFixed(1) + 'k chars)';
      sum.style.cssText = 'cursor:pointer;font-weight:700;font-size:14px;color:var(--accent2);padding:6px 0';
      const pre = document.createElement('pre');
      pre.style.cssText = 'background:var(--code-bg);border:1px solid var(--border);border-radius:10px;padding:14px;font-size:12px;white-space:pre-wrap;word-break:break-word;max-height:50vh;overflow:auto;margin-top:8px';
      pre.textContent = r.systemPrompt;
      det.append(sum, pre);
      wrap.appendChild(det);
    }
    // 🧰 抓包到的工具定义（含完整描述）
    if (r.toolDefs && r.toolDefs.length) {
      const det = document.createElement('details');
      det.style.marginBottom = '14px';
      const sum = document.createElement('summary');
      sum.textContent = t('insTools') + ' (' + r.toolDefs.length + ')';
      sum.style.cssText = 'cursor:pointer;font-weight:700;font-size:14px;color:var(--accent2);padding:6px 0';
      det.appendChild(sum);
      const box = document.createElement('div');
      box.style.cssText = 'margin-top:8px;display:flex;flex-direction:column;gap:6px';
      for (const td of r.toolDefs) {
        const item = document.createElement('details');
        item.style.cssText = 'background:var(--code-bg);border:1px solid var(--border);border-radius:8px;padding:8px 12px';
        const s2 = document.createElement('summary');
        s2.style.cssText = 'cursor:pointer;font-family:ui-monospace,monospace;font-size:12.5px;color:var(--text)';
        s2.textContent = td.name;
        const d2 = document.createElement('div');
        d2.style.cssText = 'font-size:12px;color:var(--muted);margin-top:6px;white-space:pre-wrap;line-height:1.5';
        d2.textContent = td.description || '(无描述)';
        item.append(s2, d2);
        box.appendChild(item);
      }
      det.appendChild(box);
      wrap.appendChild(det);
    }
    for (const turn of r.turns) {
      if (turn.role === 'meta') {
        const meta = document.createElement('div');
        meta.className = 'turn-meta';
        meta.textContent = `⏱ ${fmt(t('replayTurnMeta'), { s: Math.round(turn.durationMs / 1000), n: turn.messageCount })}`;
        wrap.appendChild(meta);
        continue;
      }
      const b = document.createElement('div');
      b.className = 'bubble ' + turn.role;
      const ts = document.createElement('div'); ts.className = 'bts';
      ts.textContent = (turn.ts || '').replace('T', ' ').slice(0, 16) + (turn.model ? ' · ' + turn.model : '');
      b.appendChild(ts);
      // 💭 思考过程：回复是怎么想出来的
      if (turn.thinking) {
        const det = document.createElement('details');
        det.className = 'thinking';
        const sum = document.createElement('summary'); sum.textContent = t('replayThinking') + (turn.thinkingLive ? ' 🕵️' : '');
        const pre = document.createElement('pre'); pre.textContent = turn.thinking;
        det.append(sum, pre);
        b.appendChild(det);
      }
      if (turn.text) {
        // 助手回复按 markdown 渲染；用户消息保留原文（纯文本）
        if (turn.role === 'assistant') {
          const mb = document.createElement('div'); mb.className = 'mdbody';
          mb.innerHTML = md(turn.text);
          b.appendChild(mb);
        } else {
          b.appendChild(document.createTextNode(turn.text));
        }
      }
      // 🔁 这条 query 触发的所有 LLM 调用（点开看每轮输入/输出）
      if (turn.role === 'user' && turn.rounds && turn.rounds.length) {
        const outer = document.createElement('details');
        outer.style.cssText = 'margin-top:8px;border-top:1px solid rgba(217,123,79,.3);padding-top:6px';
        const osum = document.createElement('summary');
        osum.style.cssText = 'cursor:pointer;font-size:12px;color:var(--accent2);font-weight:600';
        osum.textContent = fmt(t('queryRounds'), { n: turn.rounds.length });
        outer.appendChild(osum);
        turn.rounds.forEach((rd, i) => {
          const det = document.createElement('details');
          det.style.cssText = 'margin:6px 0 0 8px;border-left:2px solid var(--border);padding-left:10px';
          const sum = document.createElement('summary');
          sum.style.cssText = 'cursor:pointer;font-size:11.5px;font-family:ui-monospace,monospace;color:var(--text)';
          sum.textContent = `#${i + 1} · ${rd.model} · ${rd.messagesCount} msgs · ${Math.round(rd.durationMs / 1000)}s · ${rd.toolCount} tools${rd.hasThinking ? ' · 💭' : ''}`;
          det.appendChild(sum);
          const body = document.createElement('div');
          body.style.cssText = 'padding:6px 0;font-size:11.5px;color:var(--muted)';
          body.textContent = t('roundsLoading');
          det.appendChild(body);
          let loaded = false;
          det.addEventListener('toggle', async () => {
            if (!det.open || loaded) return;
            loaded = true;
            try {
              const d = await api('GET', 'inspector/' + rd.id);
              body.innerHTML = '';
              const add = (label, text, mono) => {
                if (!text) return;
                const l = document.createElement('div'); l.className = 'tlabel'; l.textContent = label;
                const p = document.createElement('pre');
                p.style.cssText = 'background:var(--code-bg);border:1px solid var(--border);border-radius:8px;padding:9px 11px;font-size:11px;white-space:pre-wrap;word-break:break-word;max-height:40vh;overflow:auto;margin:4px 0 9px' + (mono ? '' : ';font-family:inherit');
                p.textContent = text;
                body.append(l, p);
              };
              if (d.usage) add(t('insUsage'), `in ${(d.usage.input_tokens||0).toLocaleString()} · out ${(d.usage.output_tokens||0).toLocaleString()} · cache-r ${(d.usage.cache_read_input_tokens||0).toLocaleString()} · cache-w ${(d.usage.cache_creation_input_tokens||0).toLocaleString()}`, true);
              add(t('roundInput'), d.lastUser, false);
              add(t('replayThinking'), d.thinking, false);
              add(t('roundOutput'), d.outText, false);
            } catch (e) { body.textContent = t('loadFail') + e.message; }
          });
          outer.appendChild(det);
        });
        b.appendChild(outer);
      }
      // 🔧 工具轨迹：摘要行带内容预览，展开看完整输入 + 返回
      for (const tool of (turn.tools || [])) {
        const det = document.createElement('details');
        det.open = true; // 默认展开，trace 一目了然
        const sum = document.createElement('summary');
        // 从 input 提取一句预览（command / file_path / pattern 等常见字段）
        let preview = '';
        try {
          const inp = JSON.parse(tool.input);
          preview = inp.command || inp.file_path || inp.path || inp.pattern || inp.description || inp.url || inp.prompt || '';
        } catch {}
        preview = String(preview).replace(/\s+/g, ' ').slice(0, 80);
        sum.innerHTML = `🔧 <b>${esc(tool.name)}</b>${preview ? ' <span style="color:var(--muted);font-weight:400">' + esc(preview) + '</span>' : ''}`;
        det.appendChild(sum);
        const lin = document.createElement('div'); lin.className = 'tlabel'; lin.textContent = t('replayInput');
        const pin = document.createElement('pre'); pin.textContent = tool.input;
        det.append(lin, pin);
        if (tool.result) {
          const lout = document.createElement('div'); lout.className = 'tlabel'; lout.textContent = t('replayResult');
          const pout = document.createElement('pre'); pout.textContent = tool.result;
          det.append(lout, pout);
        }
        b.appendChild(det);
      }
      wrap.appendChild(b);
    }
    if (r.truncated) {
      const n = document.createElement('div');
      n.style.cssText = 'color:var(--muted);font-size:12px;margin:10px 0';
      n.textContent = t('replayTruncated');
      wrap.appendChild(n);
    }
    $('#metabar').style.display = 'none';
    $('#render').innerHTML = '';
    $('#render').classList.add('wide');
    $('#render').appendChild(wrap);
  } catch (e) { toast(t('loadFail') + e.message, false); }
}

// ---------- 导出 / 导入 ----------
$('#exportBtn').onclick = () => { location.href = '/api/export'; };
$('#importBtn').onclick = () => $('#importFile').click();
$('#importFile').onchange = async e => {
  const f = e.target.files[0];
  if (!f) return;
  try {
    const bundle = JSON.parse(await f.text());
    const r = await api('POST', 'import', bundle);
    toast(fmt(t('importDone'), { c: r.created.length, s: r.skipped.length }));

// ---------- Inspector 抓包 ----------
let _insTimer = null, _insProxyPort = 0;
function startInspectorPoll() { stopInspectorPoll(); refreshInspector(); _insTimer = setInterval(refreshInspector, 2500); }
function stopInspectorPoll() { if (_insTimer) { clearInterval(_insTimer); _insTimer = null; } }
async function refreshInspector() {
  if (state.type !== 'inspector') return stopInspectorPoll();
  try {
    const d = await api('GET', 'inspector');
    _insProxyPort = d.proxyPort;
    const changed = JSON.stringify(d.items.map(i => i.key)) !== JSON.stringify(state.items.map(i => i.key));
    state.items = d.items;
    document.querySelector('.tab[data-type="inspector"] .cnt').textContent = d.items.length;
    if (changed && !state.current) renderList();
    if (!d.items.length && !state.current) renderInspectorEmpty();
  } catch {}
}
function renderInspectorEmpty() {
  const cmd = `ANTHROPIC_BASE_URL=http://localhost:${_insProxyPort || 4322} claude`;
  $('#empty').style.display = 'none';
  $('#render').style.display = 'block';
  $('#render').classList.remove('wide');
  $('#render').innerHTML = `<div class="chart"><h3>🕵️ Inspector</h3>
    <p style="color:var(--muted);font-size:13.5px;margin-bottom:12px">${esc(t('insEmpty'))}</p>
    <pre style="background:var(--code-bg);border:1px solid var(--border);border-radius:10px;padding:14px;font-family:ui-monospace,monospace;font-size:13px">${esc(cmd)}</pre>
    <div style="margin-top:12px"><button class="btn primary" id="insCopyBtn">${esc(t('insCopy'))}</button></div>
    <p style="color:var(--muted);font-size:11.5px;margin-top:12px">${esc(t('insHint'))}</p></div>`;
  const cb = $('#insCopyBtn');

// ---------- 轻量 Markdown 渲染 ----------
function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function inline(s) {
  return esc(s)
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\*\*([^*]+)\*\*/g, '<b>$1</b>')
    .replace(/(^|[^*])\*([^*\s][^*]*)\*/g, '$1<i>$2</i>')
    .replace(/\[([^\]]+)\]\(([^)\s]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
}
function md(src) {
  const lines = src.split(/\r?\n/);
  let html = '', i = 0;
  while (i < lines.length) {
    const l = lines[i];
    // 代码块
    if (/^```/.test(l)) {
      let buf = []; i++;
      while (i < lines.length && !/^```/.test(lines[i])) buf.push(lines[i++]);
      i++;
      html += `<pre><code>${esc(buf.join('\n'))}</code></pre>`;
      continue;
    }
    // 表格
    if (l.includes('|') && i + 1 < lines.length && /^\s*\|?[\s:|-]+\|[\s:|-]*$/.test(lines[i+1])) {
      const cells = r => r.replace(/^\s*\|/, '').replace(/\|\s*$/, '').split('|').map(c => c.trim());
      let t = '<table><thead><tr>' + cells(l).map(c => `<th>${inline(c)}</th>`).join('') + '</tr></thead><tbody>';
      i += 2;
      while (i < lines.length && lines[i].includes('|')) {
        t += '<tr>' + cells(lines[i]).map(c => `<td>${inline(c)}</td>`).join('') + '</tr>';
        i++;
      }
      html += t + '</tbody></table>';
      continue;
    }
    // 标题
    const h = l.match(/^(#{1,6})\s+(.*)/);
    if (h) { html += `<h${h[1].length}>${inline(h[2])}</h${h[1].length}>`; i++; continue; }
    // 分割线
    if (/^\s*(-{3,}|\*{3,})\s*$/.test(l)) { html += '<hr>'; i++; continue; }
    // 引用
    if (/^\s*>/.test(l)) {
      let buf = [];
      while (i < lines.length && /^\s*>/.test(lines[i])) buf.push(lines[i++].replace(/^\s*>\s?/, ''));
      html += `<blockquote>${md(buf.join('\n'))}</blockquote>`;
      continue;
    }
    // 列表
    if (/^\s*([-*+]|\d+\.)\s+/.test(l)) {
      const ordered = /^\s*\d+\./.test(l);
      let items = [];
      while (i < lines.length && /^\s*([-*+]|\d+\.)\s+/.test(lines[i])) {
        items.push(lines[i].replace(/^\s*([-*+]|\d+\.)\s+/, ''));
        i++;
      }
      const tag = ordered ? 'ol' : 'ul';
      html += `<${tag}>` + items.map(it => `<li>${inline(it)}</li>`).join('') + `</${tag}>`;
      continue;
    }
    // 空行
    if (!l.trim()) { i++; continue; }
    // 段落
    let buf = [l];
    i++;
    while (i < lines.length && lines[i].trim() && !/^(#|```|\s*([-*+]|\d+\.)\s|\s*>|\s*-{3,}\s*$)/.test(lines[i]) && !lines[i].includes('|')) {
      buf.push(lines[i]); i++;
    }
    html += `<p>${inline(buf.join(' '))}</p>`;
  }
  return html;
}

function pickBadge(d) {
  if (d.peakHour !== null && (d.peakHour >= 22 || d.peakHour <= 5) || d.lateNightMessages > 100) return t('bNight');
  if (d.activeDays > 0 && d.cost / d.activeDays > 30) return t('bBurner');
  if (d.streak >= 5) return t('bStreak');
  return t('bShip');
}

function rr(ctx, x, y, w, h, r, fill, stroke) {
  ctx.beginPath();
  ctx.roundRect(x, y, w, h, r);
  if (fill) { ctx.fillStyle = fill; ctx.fill(); }
  if (stroke) { ctx.strokeStyle = stroke; ctx.lineWidth = 2; ctx.stroke(); }
}

function drawWrapped(d) {
  const cv = $('#wcanvas');
  const W = 1080, H = 1350, S = 2; // 2x 导出更清晰
  cv.width = W * S; cv.height = H * S;
  const ctx = cv.getContext('2d');
  ctx.scale(S, S);
  const F = '-apple-system, "PingFang SC", "Hiragino Sans", sans-serif';
  const M = 'ui-monospace, "SF Mono", Menlo, monospace';

  // 背景：深色渐变 + 顶部品牌色光晕
  const g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, '#0f1115'); g.addColorStop(1, '#191019');
  ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
  const rg = ctx.createRadialGradient(W / 2, 160, 0, W / 2, 160, 560);
  rg.addColorStop(0, 'rgba(217,123,79,.16)'); rg.addColorStop(1, 'rgba(217,123,79,0)');
  ctx.fillStyle = rg; ctx.fillRect(0, 0, W, 720);

  // 头部
  ctx.textAlign = 'center';
  ctx.fillStyle = '#e8965f'; ctx.font = `700 30px ${F}`;
  ctx.fillText('⌘   C L A U D E   C O D E   W R A P P E D', W / 2, 98);
  const rangeLbl = d.days === 7 ? t('wR7') : d.days === 30 ? t('wR30') : t('rgAll');
  ctx.fillStyle = '#8b93a5'; ctx.font = `400 26px ${F}`;
  ctx.fillText(`${rangeLbl} · ${d.from} → ${d.to}`, W / 2, 146);

  // 主数字：花费
  ctx.fillStyle = '#ffffff'; ctx.font = `800 148px ${F}`;
  const hero = d.costKnown ? '$' + d.cost.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 }) : fmtNum(d.tokens);
  ctx.fillText(hero, W / 2, 330);
  ctx.fillStyle = '#8b93a5'; ctx.font = `400 30px ${F}`;
  ctx.fillText(d.costKnown ? t('wSpent') : 'tokens', W / 2, 386);

  // 2×2 数据网格
  const tiles = [
    [fmtNum(d.sessions), t('wSessions')], [fmtNum(d.messages), t('wMessages')],
    [fmtNum(d.tokens), 'tokens'], [String(d.activeDays), t('wDays')],
  ];
  const tw = 470, th = 148, gap = 36, x0 = (W - tw * 2 - gap) / 2, y0 = 448;
  tiles.forEach((tl, i) => {
    const x = x0 + (i % 2) * (tw + gap), y = y0 + Math.floor(i / 2) * (th + 28);
    rr(ctx, x, y, tw, th, 20, '#171a21', '#2a2f3a');
    ctx.fillStyle = '#fff'; ctx.font = `700 52px ${F}`;
    ctx.fillText(tl[0], x + tw / 2, y + 70);
    ctx.fillStyle = '#8b93a5'; ctx.font = `400 24px ${F}`;
    ctx.fillText(tl[1], x + tw / 2, y + 112);
  });

  // 明细行
  const rows = [
    [t('wTopCmd'), d.topCommands[0] ? `/${d.topCommands[0][0]}  ×${d.topCommands[0][1]}` : '—'],
    [t('wTopModel'), d.topModel ? d.topModel.name : '—'],
    [t('wPeak'), d.peakHour !== null ? `${d.peakHour}:00 – ${d.peakHour + 1}:00` : '—'],
    [t('wStreak'), `${d.streak} ${t('wDaysUnit')}`],
  ];
  let ry = 880;
  rows.forEach(r => {
    ctx.textAlign = 'left';
    ctx.fillStyle = '#8b93a5'; ctx.font = `400 28px ${F}`;
    ctx.fillText(r[0], x0 + 6, ry);
    ctx.textAlign = 'right';
    ctx.fillStyle = '#e6e9ef'; ctx.font = `700 32px ${M}`;
    ctx.fillText(r[1], W - x0 - 6, ry);
    ry += 72;
    ctx.strokeStyle = 'rgba(42,47,58,.7)'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(x0, ry - 44); ctx.lineTo(W - x0, ry - 44); ctx.stroke();
  });

  // 称号徽章
  ctx.textAlign = 'center';
  const badge = pickBadge(d);
  ctx.font = `700 34px ${F}`;
  const bw = Math.max(360, ctx.measureText(badge).width + 120);
  rr(ctx, W / 2 - bw / 2, 1176, bw, 78, 39, 'rgba(217,123,79,.14)', '#d97b4f');
  ctx.fillStyle = '#e8965f';
  ctx.fillText(badge, W / 2, 1228);

  // 页脚
  ctx.fillStyle = '#8b93a5'; ctx.font = `400 24px ${M}`;
  ctx.fillText('npx claude-code-panel', W / 2, 1298);
  ctx.fillStyle = '#4a5160';
  ctx.fillText('github.com/13days/claude-panel', W / 2, 1332);
}

function statsHTML(d) {
  let h = '';
  // Live 实时条
  h += `<div id="liveBar"><span class="dot"></span>
    <span><span class="lv">${esc(t('liveToday'))}</span> <b class="cost" id="lvCost">—</b></span>
    <span><span class="lv">${esc(t('liveBurn'))}</span> <b id="lvBurn">—</b></span>
    <span><span class="lv">${esc(t('liveActive'))}</span> <b id="lvAct">—</b></span>
    <span style="margin-left:auto"><span class="lv">${esc(t('liveBudget'))}</span> <input id="lvBudget" type="number" min="0" step="1"></span></div>`;
  // 概览卡片
  const days = d.dailyActivity || [];
  const cards = [
    [fmtNum(d.totalSessions), t('stTotalSessions')],
    [fmtNum(d.totalMessages), t('stTotalMessages')],
    [String(days.length), t('stActiveDays')],
    [(d.firstSessionDate || '').slice(0, 10) || '—', t('stSince')],
  ];
  h += '<div class="cards">' + cards.map(([v, k]) => `<div class="card"><div class="v">${esc(v)}</div><div class="k">${esc(k)}</div></div>`).join('') + '</div>';
  if (d.source === 'transcripts') h += `<div style="font-size:11.5px;color:var(--muted);margin:-8px 0 12px">${esc(t('stSource'))}</div>`;
  h += `<div style="margin:0 0 18px"><button class="btn primary" id="wrappedBtn">${esc(t('wrappedBtn'))}</button></div>`;

  // 每日消息量，单一系列：单色 + 峰值直接标注 + 悬浮提示 + 时间范围切换
  const recent = statsRange ? days.slice(-statsRange) : days;
  if (recent.length) {
    const max = Math.max(...recent.map(x => x.messageCount), 1);
    const maxIdx = recent.findIndex(x => x.messageCount === max);
    const ranges = [[14, t('rg14')], [42, t('rg42')], [90, t('rg90')], [0, t('rgAll')]];
    h += `<div class="chart"><div class="chartHead"><h3>${esc(t('stDaily'))}</h3><div class="range">`
      + ranges.map(([v, lbl]) => `<button class="rangebtn${v === statsRange ? ' active' : ''}" data-range="${v}">${esc(lbl)}</button>`).join('')
      + `</div></div><div class="bars">`;
    recent.forEach((x, i) => {
      const pct = Math.max(2, Math.round(x.messageCount / max * 100));
      const tip = `${x.date} · ${x.messageCount.toLocaleString()} msg`;
      h += `<div class="b" style="height:${pct}%" data-tip="${esc(tip)}">${i === maxIdx ? `<span class="lbl">${fmtNum(max)}</span>` : ''}</div>`;
    });
    h += `</div><div class="axis"><span>${esc(recent[0].date)}</span><span>${esc(recent[recent.length - 1].date)}</span></div></div>`;
  }

  // 模型 token 用量（类别 = 身份，固定顺序取色，名称直接标注）
  const models = Object.entries(d.modelUsage || {})
    .map(([m, u]) => ({ m, v: (u.inputTokens || 0) + (u.outputTokens || 0) }))
    .filter(x => x.v > 0)
    .sort((a, b) => b.v - a.v);
  if (models.length) {
    const shown = models.slice(0, 7);
    const rest = models.slice(7).reduce((s, x) => s + x.v, 0);
    if (rest > 0) shown.push({ m: t('stOther'), v: rest });
    const maxV = shown[0].v;
    h += `<div class="chart"><h3>${esc(t('stModels'))}</h3>`;
    shown.forEach((x, i) => {
      const pct = Math.max(1, Math.round(x.v / maxV * 100));
      const u = (d.modelUsage || {})[x.m];
      const tip = u ? `${x.m} · in ${u.inputTokens.toLocaleString()} · out ${u.outputTokens.toLocaleString()} · cache-r ${fmtNum(u.cacheReadInputTokens)} · cache-w ${fmtNum(u.cacheCreationInputTokens)}` : x.m + ' · ' + x.v.toLocaleString();
      h += `<div class="hbar-row" data-tip="${esc(tip)}">
        <div class="hbar-name">${esc(x.m)}</div>
        <div class="hbar-track"><div class="hbar-fill" style="width:${pct}%;background:${CHART_COLORS[i % CHART_COLORS.length]}"></div></div>
        <div class="hbar-val">${fmtNum(x.v)}</div></div>`;
    });
    h += '</div>';
  }

  // 24 小时活跃分布，单一系列
  const hours = Array.from({ length: 24 }, (_, i) => d.hourCounts?.[String(i)] || 0);
  const hmax = Math.max(...hours, 1);
  const hmaxIdx = hours.indexOf(hmax);
  h += `<div class="chart"><h3>${esc(t('stHours'))}</h3><div class="bars" style="height:80px">`;
  hours.forEach((v, i) => {
    const pct = Math.max(2, Math.round(v / hmax * 100));
    h += `<div class="b" style="height:${pct}%" data-tip="${i}:00 – ${i + 1}:00 · ${v.toLocaleString()}">${i === hmaxIdx ? `<span class="lbl">${fmtNum(hmax)}</span>` : ''}</div>`;
  });
  h += `</div><div class="axis"><span>0:00</span><span>12:00</span><span>23:00</span></div></div>`;

  // 使用排行：命令（来自 history，长期）+ 技能/智能体/工作流（来自 transcripts，约 30 天）
  const usage = d.usage || {};
  const rankChart = (title, entries) => {
    if (!entries.length) return '';
    const maxV = entries[0][1];
    let c = `<div class="chart"><h3>${esc(title)}</h3>`;
    entries.forEach(([name, v], i) => {
      const pct = Math.max(1, Math.round(v / maxV * 100));
      c += `<div class="hbar-row" data-tip="${esc(name + ' · ' + v.toLocaleString())}">
        <div class="hbar-name">${esc(name)}</div>
        <div class="hbar-track"><div class="hbar-fill" style="width:${pct}%;background:${CHART_COLORS[i % CHART_COLORS.length]}"></div></div>
        <div class="hbar-val">${v.toLocaleString()}</div></div>`;
    });
    return c + '</div>';
  };
  const top = obj => Object.entries(obj || {}).sort((a, b) => b[1] - a[1]).slice(0, 10);
  h += rankChart(t('stTopCommands'), top(usage.commands).map(([n, v]) => ['/' + n, v]));
  const mixed = [
    ...top(usage.skills).map(([n, v]) => [n + ' · ' + t('typeLabel')['skills'], v]),
    ...top(usage.agents).map(([n, v]) => [n + ' · ' + t('typeLabel')['agents'], v]),
    ...top(usage.workflows).map(([n, v]) => [n + ' · ' + t('typeLabel')['workflows'], v]),
  ].sort((a, b) => b[1] - a[1]).slice(0, 10);
  h += rankChart(t('stTopSkills'), mixed);

  // ccusage daily 风格的逐日明细表
  const rows = d.dailyTable || [];
  if (rows.length) {
    const num = n => `<td class="num">${n.toLocaleString()}</td>`;
    h += `<div class="chart"><h3>${esc(t('stTable'))}</h3><div style="overflow-x:auto"><table class="usage">`;
    h += `<thead><tr><th>${esc(t('thDate'))}</th><th>${esc(t('thModels'))}</th><th class="num">Input</th><th class="num">Output</th><th class="num">Cache Create</th><th class="num">Cache Read</th><th class="num">Total Tokens</th><th class="num">Cost (USD)</th></tr></thead><tbody>`;
    for (const r of rows) {
      h += `<tr><td>${esc(r.date)}</td><td>${r.models.map(m => '- ' + esc(m)).join('<br>')}</td>`
        + num(r.input) + num(r.output) + num(r.cacheCreate) + num(r.cacheRead) + num(r.totalTokens)
        + `<td class="num">$${r.cost.toFixed(2)}${r.costKnown ? '' : ' *'}</td></tr>`;
    }
    const tt = d.totals || {};
    h += `<tr class="total"><td>${esc(t('totalRow'))}</td><td></td>`
      + num(tt.input || 0) + num(tt.output || 0) + num(tt.cacheCreate || 0) + num(tt.cacheRead || 0) + num(tt.totalTokens || 0)
      + `<td class="num">$${(tt.cost || 0).toFixed(2)}${tt.costKnown ? '' : ' *'}</td></tr>`;
    h += `</tbody></table></div><div style="font-size:11.5px;color:var(--muted);margin-top:10px">${esc(t('stCostNote'))}</div></div>`;
  }
  return h;
}

// ---------- 语言切换 ----------
function applyLang() {
  document.documentElement.lang = lang;
  const sel = $('#langSel');
  if (!sel.options.length) LANGS.forEach(l => sel.add(new Option(l.label, l.code)));
  sel.value = lang;
  document.querySelectorAll('.tab').forEach(tb => { tb.firstChild.textContent = t('tabs')[tb.dataset.type]; });
  $('#search').placeholder = t('search');
  document.querySelector('.fbtn[data-origin="user"]').textContent = t('mineOnly');
  document.querySelector('.fbtn[data-origin="all"]').textContent = t('all');
  $('#newbtn').textContent = t('newBtn');
  $('#exportBtn').textContent = t('exportBtn');
  $('#importBtn').textContent = t('importBtn');
  $('#search').placeholder = state.type === 'sessions' ? t('searchSessionsPh') : t('search');
  $('#editBtn').textContent = t('edit');
  $('#saveBtn').textContent = t('save');
  $('#cancelBtn').textContent = t('cancel');
  $('#delBtn').textContent = state.type === 'plugins' ? t('uninstall') : t('del');
  $('#empty').textContent = t('emptyHint');
  $('#newName').placeholder = t('namePh');
  $('#modalCancel').textContent = t('cancel');
  $('#modalCreate').textContent = t('create');
  renderProjOptions();
  if (!state.current) $('#title').firstChild.textContent = t('noSelection');
}

async function setLang(code) {
  if (!LANGS.some(l => l.code === code)) return;
  lang = code;
  localStorage.setItem('panel-lang', lang);
  applyLang();
  // 重新拉取本地化的列表与详情
  if (CAPS[state.type].dashboard) { await renderStatsTab(); loadCounts(); return; }
  const cur = state.current;
  const { items } = await api('GET', state.type);
  state.items = items;
  renderList();
  loadCounts();
  if (cur && !state.editing) openItem(cur);
}
$('#langSel').onchange = e => setLang(e.target.value);

// ---------- 初始化 ----------
applyLang();
switchType('commands');
loadCounts();
loadProjects();
</script>
